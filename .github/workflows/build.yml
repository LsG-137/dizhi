name: Build iOS IPA for TrollStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version
          
      - name: Install XcodeGen
        run: brew install xcodegen
          
      - name: Generate Xcode project
        run: xcodegen generate
          
      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project 地志.xcodeproj \
            -scheme 地志 \
            -archivePath build/地志.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
          
      - name: Export IPA
        run: |
          mkdir -p Payload
          cp -r build/地志.xcarchive/Products/Applications/地志.app Payload/
          zip -r 地志_TrollStore.ipa Payload/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 地志-ipa
          path: 地志_TrollStore.ipa
