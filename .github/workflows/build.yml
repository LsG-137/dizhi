name: Build iOS IPA for TrollStore

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version
          
      - name: Create IPA package
        run: |
          mkdir -p Payload
          echo "地志 iOS App - 测试版本" > Payload/Info.txt
          zip -r 地志_TrollStore.ipa Payload/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 地志-ipa
          path: 地志_TrollStore.ipa
