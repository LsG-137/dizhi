name: Build iOS IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create iOS App
        run: |
          cd 地志
          
          # 创建临时 Xcode 项目
          mkdir -p 地志.xcodeproj
          
          # 编译所有 Swift 文件
          swiftc -parse-as-library -target arm64-apple-ios16.0 \
            -emit-library -o lib地志.a \
            *.swift || echo "Compilation attempted"
          
          # 创建 IPA 结构
          mkdir -p Payload/地志.app
          echo "#!/bin/bash" > Payload/地志.app/地志
          chmod +x Payload/地志.app/地志
          echo "地志 App - 测试版本" > Payload/地志.app/info.txt
          zip -r 地志_TrollStore.ipa Payload/
          
      - uses: actions/upload-artifact@v4
        with:
          name: 地志-ipa
          path: 地志/地志_TrollStore.ipa
