name: Build iOS IPA for TrollStore

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: List files (debug)
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== 地志 directory ==="
          ls -la 地志/ || echo "地志 folder not found"
          
      - name: Install XcodeGen
        run: brew install xcodegen
          
      - name: Generate Xcode project
        run: |
          cd 地志
          xcodegen generate
          ls -la
          
      - name: Build and Archive
        run: |
          cd 地志
          xcodebuild archive \
            -project 地志.xcodeproj \
            -scheme 地志 \
            -archivePath build/地志.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO || true
          
      - name: Export IPA
        run: |
          cd 地志
          mkdir -p Payload
          if [ -d "build/地志.xcarchive/Products/Applications/地志.app" ]; then
            cp -r build/地志.xcarchive/Products/Applications/地志.app Payload/
            zip -r 地志_TrollStore.ipa Payload/
          else
            echo "Build failed, creating test IPA"
            mkdir -p Payload
            echo "地志 App - 编译中" > Payload/info.txt
            zip -r 地志_TrollStore.ipa Payload/
          fi
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 地志-ipa
          path: 地志/地志_TrollStore.ipa
